services:
  - type: web
    name: eld-trip-planner-api
    env: python
    plan: free
    buildCommand: "pip install -r backend/requirements.txt && python backend/manage.py migrate"
    startCommand: "cd backend && gunicorn config.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://eld-trip-planner.vercel.app"
      - key: DATABASE_URL
        fromDatabase:
          name: eld-trip-planner-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.12.3"

databases:
  - name: eld-trip-planner-db
    plan: free
    databaseName: eld_trip_planner
